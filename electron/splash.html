<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bakup.ai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash {
      background: #0f1117;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow:
        0 0 40px rgba(139, 92, 246, 0.15),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .splash__logo {
      font-size: 36px;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .splash__logo span {
      color: #8b5cf6;
    }

    .splash__tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 36px;
    }

    .splash__status {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* Simple pulsing dots loader */
    .loader {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .loader__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8b5cf6;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .loader__dot:nth-child(2) { animation-delay: 0.2s; }
    .loader__dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash__logo">bakup<span>.ai</span></div>
    <div class="splash__tagline">Local-first incident intelligence</div>
    <div class="splash__status" id="status">Starting server&hellip;</div>
    <div class="loader">
      <div class="loader__dot"></div>
      <div class="loader__dot"></div>
      <div class="loader__dot"></div>
    </div>
  </div>
</body>
</html>
