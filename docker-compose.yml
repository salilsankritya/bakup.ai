---
# bakup.ai — AI Incident Intelligence Platform
#
# LOCAL DEVELOPMENT:
#   1. cp .env.example .env
#   2. Set BAKUP_ACCESS_KEY in .env
#   3. docker compose up
#   4. Open http://localhost:8080
#
# PRODUCTION (serve 100s of users):
#   1. cp .env.example .env  (set a strong BAKUP_ACCESS_KEY)
#   2. Edit docker-compose.yml:
#      - Change ui ports from 127.0.0.1:8080:80 → 0.0.0.0:80:80
#      - Or put behind a cloud load balancer / Cloudflare tunnel
#   3. docker compose up -d
#   4. (Optional) Point your domain DNS to the server IP
#
# All AI processing runs on the server. Users only need a browser.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      # Vector database — writable, persists between restarts.
      - bakup-vectordb:/app/vectordb
      # Model weights — writable, downloaded once on first boot.
      - bakup-models:/app/model-weights
      # Local projects — mount host directories here for /index endpoint.
      # In production, users index via upload or GitHub URL instead.
      - type: bind
        source: ./projects
        target: /app/projects
        read_only: true
      # Logs — mount host log directories here for log ingestion.
      - type: bind
        source: ./logs
        target: /app/logs
        read_only: true
    environment:
      BAKUP_HOST: "0.0.0.0"
      BAKUP_PORT: "8000"
      BAKUP_CHROMA_DIR: "/app/vectordb"
      BAKUP_MODEL_CACHE_DIR: "/app/model-weights"
      # Restrict local path indexing to mounted volumes only (Docker safety).
      BAKUP_DOCKER_VOLUMES: "/app/projects,/app/logs"
    deploy:
      resources:
        limits:
          memory: 4G       # sentence-transformers + ChromaDB need ~2GB
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s   # First boot downloads ~80MB embedding model

  ui:
    image: nginx:1.27-alpine
    ports:
      # LOCAL:  127.0.0.1:8080:80  (only your machine)
      # PRODUCTION: 0.0.0.0:80:80  (network-accessible)
      - "0.0.0.0:8080:80"
    volumes:
      - type: bind
        source: ./ui
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./ui/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Named volumes for persistence (survive docker compose down)
volumes:
  bakup-vectordb:
  bakup-models:

# To wipe the index and start clean:
#   docker compose down -v
#   docker compose up -d
