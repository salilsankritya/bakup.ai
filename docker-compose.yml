---
# bakup.ai — Local-First Incident Intelligence
#
# Usage:
#   1. cp .env.example .env
#   2. Set BAKUP_ACCESS_KEY in .env (default key for preview: tango)
#   3. docker compose up
#   4. Open http://localhost:8080
#
# All processing runs locally. No cloud. No external services.
# Binds to 127.0.0.1 only — not exposed to the network.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      # Vector database — writable, persists between restarts.
      - type: bind
        source: ./vectordb
        target: /app/vectordb
      # Model weights — writable, downloaded once on first boot.
      - type: bind
        source: ./model-weights
        target: /app/model-weights
      # Local projects — mount host directories here for /index endpoint.
      # Place your project folders inside ./projects/ on the host.
      - type: bind
        source: ./projects
        target: /app/projects
        read_only: true
      # Logs — mount host log directories here for log ingestion.
      - type: bind
        source: ./logs
        target: /app/logs
        read_only: true
    environment:
      BAKUP_HOST: "0.0.0.0"
      BAKUP_PORT: "8000"
      BAKUP_CHROMA_DIR: "/app/vectordb"
      BAKUP_MODEL_CACHE_DIR: "/app/model-weights"
      # Restrict local path indexing to mounted volumes only (Docker safety).
      BAKUP_DOCKER_VOLUMES: "/app/projects,/app/logs"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  ui:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - type: bind
        source: ./ui
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./ui/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Persistent data stays in ./vectordb and ./model-weights on the host.
# To wipe the index and start clean:
#   docker compose down
#   rm -rf ./vectordb/chroma
#   docker compose up
