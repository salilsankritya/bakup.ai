# bakup.ai — nginx reverse-proxy + static file server
#
# Serves the UI on port 80 (mapped to host 8080 in docker-compose).
# Proxies all API calls to the FastAPI backend so the browser
# never makes cross-origin requests. Zero CORS issues.

server {
    listen 80;
    server_name localhost;

    # ── Static UI files ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy to backend API ─────────────────────────────────────
    # Every API route is forwarded to the FastAPI container.
    # This keeps browser ↔ API on the same origin — no CORS needed.

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ask {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /index {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    location /llm {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
